description: >-
  EnerSys is a global leader in stored energy solutions for industrial applications,
  manufacturing batteries, chargers, accessories, and outdoor equipment enclosures.
  EnerSys serves motive power, reserve power, aerospace and defense, and specialty
  markets. While EnerSys offers a number of customer-facing web tools (Battery
  Sizing Program, Motive Power configurator, CARB Compliance Calculator) and
  product-level telemetry such as the Wi-iQ battery monitoring system and
  NexSys iON connected fleet platform, no public developer APIs or open
  specifications have been published as of this index.
